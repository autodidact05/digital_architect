services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: digital-architect-backend
    container_name: digital-architect-backend
    env_file:
      - .env
    environment:
      CHROMA_PERSIST_DIR: /app/data/database/vector_db
      SQLITE_DB_PATH: /app/data/database/audit_db/audit.db
      FRONTEND_ORIGIN: http://localhost:3000
    volumes:
      - ./data/database/vector_db:/app/data/database/vector_db
      - audit-data:/app/data/database/audit_db
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: digital-architect-frontend
    container_name: digital-architect-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  audit-data:
